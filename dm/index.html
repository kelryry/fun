<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 卷曲体毛 (单根) 参数预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

</head>
<body class="bg-gray-50 text-gray-800 h-screen w-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Canvas Area -->
    <div class="relative flex-1 bg-white flex flex-col items-center justify-center overflow-hidden border-b md:border-b-0 md:border-r border-gray-200">
        <canvas id="hairCanvas" class="cursor-move w-full h-full"></canvas>
        
        <!-- Overlay Controls for Mobile/Quick Access -->
        <div class="absolute top-4 right-4 flex flex-col gap-2">
            <button id="btnRandom" class="bg-white/90 hover:bg-white shadow-md p-2 rounded-lg text-sm font-medium text-blue-600 transition backdrop-blur-sm border border-gray-200">
                🎲 随机种子
            </button>
            <button id="btnReset" class="bg-white/90 hover:bg-white shadow-md p-2 rounded-lg text-sm font-medium text-gray-600 transition backdrop-blur-sm border border-gray-200">
                ↺ 重置参数
            </button>
        </div>

        <!-- Info Overlay -->
        <div class="absolute bottom-4 left-4 bg-white/80 backdrop-blur-sm p-2 rounded text-xs text-gray-500 pointer-events-none select-none">
            左键/单指拖动旋转 • 滚轮/双指缩放
        </div>
    </div>

    <!-- Controls Sidebar -->
    <div class="w-full md:w-96 bg-gray-50 flex flex-col h-[50vh] md:h-full shadow-inner z-10">
        <!-- Header -->
        <div class="p-4 bg-white border-b border-gray-200 flex justify-between items-center shrink-0">
            <h1 class="font-bold text-lg text-gray-800">参数设置</h1>
            <div class="flex items-center gap-2">
                <span class="text-sm text-gray-500">Seed:</span>
                <input type="number" id="seedInput" class="w-20 text-sm border border-gray-300 rounded px-2 py-1 focus:ring-2 focus:ring-blue-500 outline-none" value="1">
            </div>
        </div>

        <!-- Scrollable Parameters -->
        <div class="flex-1 overflow-y-auto custom-scroll p-4 space-y-6" id="controlsContainer">
            <!-- Controls will be injected here by JS -->
        </div>

        <!-- Status Footer -->
        <div class="p-3 bg-gray-100 border-t border-gray-200 text-xs text-gray-500 shrink-0 flex justify-between">
            <span id="statusText">Ready</span>
            <span>Version 1.0 (JS Port)</span>
        </div>
    </div>

<script>
/**
 * Math & Random Utility Classes
 */

// PRNG: Mulberry32 for deterministic seeded random numbers
class SeededRandom {
    constructor(seed) {
        this.state = seed;
    }

    // Returns a float between 0 and 1
    random() {
        let t = this.state += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        this.state = t ^ (t >>> 14); // Update state for next call
        return ((t >>> 0) / 4294967296);
    }

    // Box-Muller transform for Gaussian distribution
    gauss(mean, std) {
        let u = 0, v = 0;
        while(u === 0) u = this.random();
        while(v === 0) v = this.random();
        const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        return z * std + mean;
    }

    randRange(min, max) {
        return this.random() * (max - min) + min;
    }
}

class Vec3 {
    constructor(x, y, z) {
        this.x = x;
        this.y = y;
        this.z = z;
    }

    add(other) { return new Vec3(this.x + other.x, this.y + other.y, this.z + other.z); }
    sub(other) { return new Vec3(this.x - other.x, this.y - other.y, this.z - other.z); }
    mul(scalar) { return new Vec3(this.x * scalar, this.y * scalar, this.z * scalar); }
    div(scalar) { return new Vec3(this.x / scalar, this.y / scalar, this.z / scalar); }
    
    dot(other) { return this.x * other.x + this.y * other.y + this.z * other.z; }
    
    cross(other) {
        return new Vec3(
            this.y * other.z - this.z * other.y,
            this.z * other.x - this.x * other.z,
            this.x * other.y - this.y * other.x
        );
    }

    norm() { return Math.sqrt(this.dot(this)); }

    normalized() {
        const n = this.norm();
        if (n === 0) throw new Error("Cannot normalize zero vector");
        return this.div(n);
    }
}

/**
 * Core Algorithm Implementation (Ported from Python)
 */

function rotateRodrigues(v, axisUnit, angleRad) {
    const c = Math.cos(angleRad);
    const s = Math.sin(angleRad);
    const k = axisUnit;
    // v * c + k.cross(v) * s + k * (k.dot(v) * (1.0 - c))
    const term1 = v.mul(c);
    const term2 = k.cross(v).mul(s);
    const term3 = k.mul(k.dot(v) * (1.0 - c));
    return term1.add(term2).add(term3);
}

function ouNoise(n, correlation, rng) {
    correlation = Math.max(0.0, Math.min(0.9999, correlation));
    const sigma = Math.sqrt(1.0 - correlation * correlation);
    let x = 0.0;
    const out = [];
    for (let i = 0; i < n; i++) {
        x = correlation * x + sigma * rng.gauss(0.0, 1.0);
        out.push(x);
    }
    return out;
}

function sampleRootTangent(params, rng) {
    let tiltDeg = rng.gauss(params.root_tilt_deg_mean, params.root_tilt_deg_std);
    tiltDeg = Math.max(0.0, Math.min(85.0, tiltDeg));
    const tilt = tiltDeg * (Math.PI / 180.0);
    const az = rng.random() * (2.0 * Math.PI);
    return new Vec3(
        Math.sin(tilt) * Math.cos(az),
        Math.sin(tilt) * Math.sin(az),
        Math.cos(tilt)
    ).normalized();
}

function initialFrame(t) {
    let ref = new Vec3(0.0, 0.0, 1.0);
    if (Math.abs(t.dot(ref)) > 0.95) {
        ref = new Vec3(0.0, 1.0, 0.0);
    }
    let u = t.cross(ref);
    if (u.norm() === 0) {
        ref = new Vec3(1.0, 0.0, 0.0);
        u = t.cross(ref);
    }
    u = u.normalized();
    const v = t.cross(u).normalized();
    return [u, v];
}

function parallelTransport(u, v, t0, t1) {
    const axis = t0.cross(t1);
    const axisNorm = axis.norm();
    if (axisNorm > 1e-12) {
        const axisUnit = axis.div(axisNorm);
        const dotVal = Math.max(-1.0, Math.min(1.0, t0.dot(t1)));
        const angle = Math.atan2(axisNorm, dotVal);
        u = rotateRodrigues(u, axisUnit, angle);
        v = rotateRodrigues(v, axisUnit, angle);
    }
    
    // Orthogonalize
    u = u.sub(t1.mul(t1.dot(u))).normalized();
    v = t1.cross(u).normalized();
    return [u, v];
}

function generateStrandPoints(params, seed) {
    if (params.length_mm <= 0) throw new Error("length_mm must be > 0");
    if (params.n_points < 2) throw new Error("n_points must be >= 2");
    
    const rng = new SeededRandom(seed);
    const n = params.n_points;
    const ds = params.length_mm / (n - 1);
    
    let t = sampleRootTangent(params, rng);
    let [u, v] = initialFrame(t);
    
    const kappa0 = 1.0 / params.curl_radius_mm;
    const tauBase = 2.0 * Math.PI / params.curl_wavelength_mm;
    let theta = rng.random() * (2.0 * Math.PI);
    
    const kappaNoise = ouNoise(n, params.noise_correlation, rng);
    const tauNoise = ouNoise(n, params.noise_correlation, rng);
    
    let p = new Vec3(0.0, 0.0, 0.0);
    const points = [p];
    
    const g = new Vec3(0.0, 0.0, -1.0);
    
    for (let i = 0; i < n - 1; i++) {
        let kappa = kappa0 * (1.0 + params.kappa_noise * kappaNoise[i]);
        kappa = Math.max(0.02 * kappa0, kappa);
        
        let tau = params.helixness * tauBase + params.tau_noise * tauBase * tauNoise[i];
        theta += tau * ds;
        
        if (params.kink_rate_per_mm > 0 && rng.random() < params.kink_rate_per_mm * ds) {
            theta += (params.kink_angle_deg * (Math.PI/180)) * rng.gauss(0.0, 1.0);
            kappa *= 1.0 + 0.35 * rng.gauss(0.0, 1.0);
            kappa = Math.max(0.02 * kappa0, kappa);
        }
        
        // Calculate curvature direction
        const curvDir = u.mul(Math.cos(theta)).add(v.mul(Math.sin(theta))).normalized();
        
        // Gravity effect perpendicular to tangent
        const gPerp = g.sub(t.mul(t.dot(g)));
        const kvec = curvDir.mul(kappa).add(gPerp.mul(params.gravity_sag_mm_inv));
        
        const tNew = t.add(kvec.mul(ds)).normalized();
        p = p.add(tNew.mul(ds));
        
        [u, v] = parallelTransport(u, v, t, tNew);
        t = tNew;
        
        points.push(p);
    }
    
    return points;
}

/**
 * UI & Application Logic
 */

// Parameter configuration definitions
const PARAM_CONFIGS = [
    { key: 'length_mm', label: '长度 (mm)', min: 10, max: 80, step: 0.5, def: 40.0 },
    { key: 'n_points', label: '采样点数', min: 60, max: 500, step: 1, def: 220, isInt: true },
    { key: 'curl_radius_mm', label: '卷曲半径 (mm)', min: 0.6, max: 8.0, step: 0.05, def: 2.3 },
    { key: 'curl_wavelength_mm', label: '卷曲波长 (mm)', min: 2.0, max: 25.0, step: 0.1, def: 7.0 },
    { key: 'helixness', label: '3D 螺旋度', min: 0.0, max: 1.0, step: 0.01, def: 0.65 },
    { key: 'kappa_noise', label: '曲率噪声', min: 0.0, max: 0.8, step: 0.01, def: 0.25 },
    { key: 'tau_noise', label: '扭转噪声', min: 0.0, max: 0.8, step: 0.01, def: 0.20 },
    { key: 'noise_correlation', label: '噪声相关性', min: 0.80, max: 0.999, step: 0.001, def: 0.97 },
    { key: 'gravity_sag_mm_inv', label: '重力下垂', min: 0.0, max: 0.08, step: 0.002, def: 0.02 },
    { key: 'kink_rate_per_mm', label: '折点频率', min: 0.0, max: 0.20, step: 0.005, def: 0.04 },
    { key: 'kink_angle_deg', label: '折点角度 (deg)', min: 0.0, max: 45.0, step: 0.5, def: 18.0 },
    { key: 'root_tilt_deg_mean', label: '根部倾角均值 (deg)', min: 0.0, max: 60.0, step: 0.5, def: 25.0 },
    { key: 'root_tilt_deg_std', label: '根部倾角方差 (deg)', min: 0.0, max: 30.0, step: 0.5, def: 12.0 },
];

class App {
    constructor() {
        this.canvas = document.getElementById('hairCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.params = {};
        this.domElements = {};
        
        // Camera State
        this.yaw = 0.6;
        this.pitch = 0.4;
        this.zoom = 1.0;
        this.fovDeg = 50.0;
        this.camDistMm = 120.0;
        this.center = new Vec3(0,0,0);
        
        // Data State
        this.points = [];
        this.seed = 1;
        
        // Interaction State
        this.isDragging = false;
        this.lastMouseX = 0;
        this.lastMouseY = 0;
        this.regenTimeout = null;

        this.initUI();
        this.bindEvents();
        this.resize();
        this.regenerate();
    }

    initUI() {
        const container = document.getElementById('controlsContainer');
        
        // View Scale Slider (Special case)
        const viewGroup = document.createElement('div');
        viewGroup.className = 'bg-white p-3 rounded-lg shadow-sm border border-gray-100';
        viewGroup.innerHTML = `
            <div class="flex justify-between mb-1">
                <label class="text-sm font-medium text-blue-600">视角缩放</label>
                <span id="val_zoom" class="text-xs font-mono text-gray-500">1.00</span>
            </div>
            <input type="range" id="input_zoom" min="0.6" max="2.5" step="0.01" value="1.0" class="w-full">
        `;
        container.appendChild(viewGroup);
        this.domElements['zoom'] = document.getElementById('input_zoom');
        this.domElements['val_zoom'] = document.getElementById('val_zoom');
        
        // Generate parameter sliders
        PARAM_CONFIGS.forEach(cfg => {
            const div = document.createElement('div');
            div.className = 'group';
            div.innerHTML = `
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium text-gray-700">${cfg.label}</label>
                    <span id="val_${cfg.key}" class="text-xs font-mono text-gray-400 group-hover:text-blue-500 transition-colors">${cfg.def}</span>
                </div>
                <input type="range" id="input_${cfg.key}" 
                    min="${cfg.min}" max="${cfg.max}" step="${cfg.step}" value="${cfg.def}" 
                    class="w-full accent-blue-500">
            `;
            container.appendChild(div);
            
            // Cache elements
            this.domElements[cfg.key] = document.getElementById(`input_${cfg.key}`);
            this.domElements[`val_${cfg.key}`] = document.getElementById(`val_${cfg.key}`);
            
            // Set initial param value
            this.params[cfg.key] = cfg.def;

            // Bind listener
            this.domElements[cfg.key].addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                this.params[cfg.key] = val;
                this.domElements[`val_${cfg.key}`].innerText = cfg.isInt ? Math.round(val) : val.toFixed(2);
                this.scheduleRegen();
            });
        });

        // Zoom listener
        this.domElements['zoom'].addEventListener('input', (e) => {
            this.zoom = parseFloat(e.target.value);
            this.domElements['val_zoom'].innerText = this.zoom.toFixed(2);
            this.redraw();
        });

        // Seed Input
        document.getElementById('seedInput').addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (isNaN(val)) val = 1;
            this.seed = val;
            this.regenerate();
        });

        // Buttons
        document.getElementById('btnRandom').addEventListener('click', () => {
            this.seed = Math.floor(Math.random() * 1000000);
            document.getElementById('seedInput').value = this.seed;
            this.regenerate();
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            this.resetParams();
        });
    }

    resetParams() {
        PARAM_CONFIGS.forEach(cfg => {
            this.params[cfg.key] = cfg.def;
            this.domElements[cfg.key].value = cfg.def;
            this.domElements[`val_${cfg.key}`].innerText = cfg.isInt ? cfg.def : cfg.def.toFixed(2); // Fix: handle int formatting
        });
        this.seed = 1;
        document.getElementById('seedInput').value = 1;
        this.zoom = 1.0;
        this.domElements['zoom'].value = 1.0;
        this.domElements['val_zoom'].innerText = "1.00";
        this.yaw = 0.6;
        this.pitch = 0.4;
        this.regenerate();
    }

    scheduleRegen() {
        if (this.regenTimeout) clearTimeout(this.regenTimeout);
        this.regenTimeout = setTimeout(() => this.regenerate(), 20); // 50fps max regen
    }

    regenerate() {
        try {
            this.points = generateStrandPoints(this.params, this.seed);
            
            // Calculate center
            if (this.points.length > 0) {
                let minX = Infinity, maxX = -Infinity;
                let minY = Infinity, maxY = -Infinity;
                let minZ = Infinity, maxZ = -Infinity;
                
                this.points.forEach(p => {
                    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
                    minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
                });
                
                this.center = new Vec3(
                    (minX + maxX) * 0.5,
                    (minY + maxY) * 0.5,
                    (minZ + maxZ) * 0.5
                );
            }
            
            document.getElementById('statusText').innerText = `Points: ${this.points.length}`;
            this.redraw();
        } catch (e) {
            console.error(e);
            document.getElementById('statusText').innerText = "Error in generation";
        }
    }

    rotX(v, angle) {
        const c = Math.cos(angle);
        const s = Math.sin(angle);
        return new Vec3(v.x, c * v.y - s * v.z, s * v.y + c * v.z);
    }

    rotY(v, angle) {
        const c = Math.cos(angle);
        const s = Math.sin(angle);
        return new Vec3(c * v.x + s * v.z, v.y, -s * v.x + c * v.z);
    }

    project(p, camDist) {
        let v = p.sub(this.center);
        v = this.rotX(v, this.pitch);
        v = this.rotY(v, this.yaw);
        
        let zCam = v.z + camDist;
        zCam = Math.max(1e-3, zCam);
        
        const xn = v.x / zCam;
        const yn = v.y / zCam;
        return { x: xn, y: yn, z: zCam };
    }

    resize() {
        const parent = this.canvas.parentElement;
        this.width = parent.clientWidth;
        this.height = parent.clientHeight;
        
        // Handle High DPI
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = this.width * dpr;
        this.canvas.height = this.height * dpr;
        this.ctx.scale(dpr, dpr);
        this.canvas.style.width = this.width + "px";
        this.canvas.style.height = this.height + "px";
        
        this.redraw();
    }

    redraw() {
        if (!this.ctx) return;
        
        this.ctx.clearRect(0, 0, this.width, this.height);
        
        if (this.points.length < 2) return;

        const fov = this.fovDeg * (Math.PI / 180);
        let focal = (0.5 * Math.min(this.width, this.height)) / Math.tan(0.5 * fov);
        focal *= Math.max(0.6, this.zoom);
        
        // Project points
        const proj = this.points.map(p => this.project(p, this.camDistMm));
        
        // Sort segments for painter's algorithm (draw far to near)
        const segs = [];
        for (let i = 0; i < proj.length - 1; i++) {
            const zMid = (proj[i].z + proj[i+1].z) * 0.5;
            segs.push({ idx: i, z: zMid });
        }
        segs.sort((a, b) => b.z - a.z);

        const rootW = 1.3;
        const tipW = 0.3;
        const taperPow = 1.6;
        
        const cx = this.width * 0.5;
        const cy = this.height * 0.5;

        // Draw segments
        this.ctx.lineCap = 'round';
        this.ctx.strokeStyle = '#000000';
        
        segs.forEach(item => {
            const i = item.idx;
            const t = i / Math.max(1, proj.length - 2);
            const wPx = rootW + (tipW - rootW) * Math.pow(t, taperPow);
            
            const x0 = proj[i].x * focal + cx;
            const y0 = proj[i].y * focal + cy;
            const x1 = proj[i+1].x * focal + cx;
            const y1 = proj[i+1].y * focal + cy;
            
            this.ctx.beginPath();
            this.ctx.moveTo(x0, y0);
            this.ctx.lineTo(x1, y1);
            this.ctx.lineWidth = Math.max(0.5, wPx);
            this.ctx.stroke();
        });

        // Draw Root
        const rootX = proj[0].x * focal + cx;
        const rootY = proj[0].y * focal + cy;
        this.ctx.fillStyle = '#000000';
        this.ctx.beginPath();
        this.ctx.arc(rootX, rootY, 3, 0, Math.PI * 2);
        this.ctx.fill();

        this.drawGizmo(cx, cy);
    }

    drawGizmo(cx, cy) {
        const originX = 64;
        const originY = this.height - 64;
        const axisLen = 42;

        this.ctx.fillStyle = '#000000';
        this.ctx.beginPath();
        this.ctx.arc(originX, originY, 2, 0, Math.PI*2);
        this.ctx.fill();

        const axes = [
            { name: "X", v: new Vec3(1,0,0), c: "#d62728" },
            { name: "Y", v: new Vec3(0,1,0), c: "#2ca02c" },
            { name: "Z", v: new Vec3(0,0,1), c: "#1f77b4" }
        ];

        this.ctx.lineWidth = 2;
        this.ctx.font = "bold 12px Segoe UI, sans-serif";
        this.ctx.textAlign = "center";
        this.ctx.textBaseline = "middle";

        axes.forEach(axis => {
            let rv = this.rotX(axis.v, this.pitch);
            rv = this.rotY(rv, this.yaw);
            
            const endX = originX + rv.x * axisLen;
            const endY = originY + rv.y * axisLen;
            
            this.ctx.beginPath();
            this.ctx.moveTo(originX, originY);
            this.ctx.lineTo(endX, endY);
            this.ctx.strokeStyle = axis.c;
            this.ctx.stroke();

            // Label
            const d = Math.sqrt(rv.x*rv.x + rv.y*rv.y) || 1.0;
            const lblX = endX + (rv.x/d) * 12;
            const lblY = endY + (rv.y/d) * 12;
            
            this.ctx.fillStyle = axis.c;
            this.ctx.fillText(axis.name, lblX, lblY);
        });
    }

    bindEvents() {
        window.addEventListener('resize', () => this.resize());

        // Mouse Events
        this.canvas.addEventListener('mousedown', (e) => {
            this.isDragging = true;
            this.lastMouseX = e.clientX;
            this.lastMouseY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!this.isDragging) return;
            const dx = e.clientX - this.lastMouseX;
            const dy = e.clientY - this.lastMouseY;
            this.lastMouseX = e.clientX;
            this.lastMouseY = e.clientY;
            
            this.yaw += dx * 0.008;
            this.pitch += dy * 0.008;
            this.pitch = Math.max(-1.4, Math.min(1.4, this.pitch));
            this.redraw();
        });

        window.addEventListener('mouseup', () => this.isDragging = false);

        // Wheel Zoom
        this.canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY > 0 ? 1/1.08 : 1.08;
            this.zoom = Math.max(0.6, Math.min(2.5, this.zoom * factor));
            this.domElements['zoom'].value = this.zoom;
            this.domElements['val_zoom'].innerText = this.zoom.toFixed(2);
            this.redraw();
        }, { passive: false });

        // Touch Events
        let lastTouchX = 0;
        let lastTouchY = 0;
        let lastTouchDist = 0;

        this.canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent scrolling
            if (e.touches.length === 1) {
                this.isDragging = true;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.hypot(dx, dy);
            }
        }, { passive: false });

        this.canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && this.isDragging) {
                const dx = e.touches[0].clientX - lastTouchX;
                const dy = e.touches[0].clientY - lastTouchY;
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                
                this.yaw += dx * 0.008;
                this.pitch += dy * 0.008;
                this.pitch = Math.max(-1.4, Math.min(1.4, this.pitch));
                this.redraw();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.hypot(dx, dy);
                
                if (lastTouchDist > 0) {
                    const ratio = dist / lastTouchDist;
                    // Dampen the zoom speed for touch
                    const factor = 1 + (ratio - 1) * 0.8;
                    this.zoom = Math.max(0.6, Math.min(2.5, this.zoom * factor));
                    this.domElements['zoom'].value = this.zoom;
                    this.domElements['val_zoom'].innerText = this.zoom.toFixed(2);
                    this.redraw();
                }
                lastTouchDist = dist;
            }
        }, { passive: false });

        this.canvas.addEventListener('touchend', () => {
            this.isDragging = false;
            lastTouchDist = 0;
        });
    }
}

// Start App
window.onload = () => {
    new App();
};
</script>
