<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web大师 - 硬件性能极限评测</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff0055;
            --accent: #ffee00;
            --bg: #050505;
            --panel: rgba(20, 20, 25, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: white;
            user-select: none;
        }

        /* 背景动画网格 */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* 主布局 */
        #app {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
        }

        /* 左侧边栏 - 硬件信息 */
        #sidebar {
            width: 300px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .hw-item {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .hw-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .hw-value {
            font-size: 14px;
            color: #fff;
            font-weight: 600;
            word-break: break-all;
        }

        /* 右侧主区域 */
        #main-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 3D Canvas 容器 (GPU测试用) */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* 仪表盘 UI */
        .dashboard {
            position: relative;
            z-index: 20;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .big-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 10px solid rgba(255,255,255,0.05);
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle, rgba(0,243,255,0.1) 0%, rgba(0,0,0,0) 70%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .score-display {
            font-size: 60px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px var(--primary);
        }

        .score-label {
            font-size: 14px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .status-text {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ddd;
            min-height: 36px;
        }

        .sub-status {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        /* 进度条 */
        .progress-wrapper {
            width: 80%;
            height: 4px;
            background: #222;
            margin: 0 auto 40px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease-out;
            box-shadow: 0 0 10px var(--primary);
        }

        /* 详细分数网格 */
        .grid-scores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            opacity: 0.5;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .grid-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .grid-item.active {
            border-color: var(--primary);
            background: rgba(0, 243, 255, 0.05);
            opacity: 1;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .item-name {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .item-score {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        /* 按钮 */
        .btn-start {
            background: linear-gradient(45deg, var(--primary), #00aaff);
            border: none;
            padding: 15px 50px;
            color: #000;
            font-size: 18px;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.6);
        }

        .btn-start:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 矩阵动画 Canvas (CPU测试用) */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 800px) {
            #app { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; gap: 20px; padding: 10px; }
            .hw-item { flex: 1; min-width: 150px; border: none; }
            .big-circle { width: 180px; height: 180px; }
            .score-display { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div id="app">
        <!-- 侧边栏：显示侦测到的硬件参数 -->
        <div id="sidebar">
            <div class="logo">⚡ Web大师 <span style="font-size:12px; color:#666; margin-top:5px;">Pro</span></div>
            
            <div class="hw-item">
                <div class="hw-label">操作系统</div>
                <div class="hw-value" id="os-info">扫描中...</div>
            </div>
            
            <div class="hw-item">
                <div class="hw-label">处理器 (逻辑核心)</div>
                <div class="hw-value" id="cpu-info">扫描中...</div>
            </div>

            <div class="hw-item">
                <div class="hw-label">显卡 (GPU)</div>
                <div class="hw-value" id="gpu-info">扫描中...</div>
            </div>

            <div class="hw-item">
                <div class="hw-label">内存 (估算)</div>
                <div class="hw-value" id="mem-info">扫描中...</div>
            </div>

            <div class="hw-item">
                <div class="hw-label">屏幕分辨率</div>
                <div class="hw-value" id="res-info">--</div>
            </div>
            
            <div style="margin-top:auto; font-size:12px; color:#555;">
                * 受浏览器安全限制，部分硬件型号仅能模糊识别。评分仅供参考。
            </div>
        </div>

        <!-- 主区域 -->
        <div id="main-area">
            <div id="canvas-container"></div>
            <canvas id="matrix-canvas"></canvas>

            <div class="dashboard">
                <div class="big-circle">
                    <div class="score-display" id="main-score">0</div>
                    <div class="score-label">综合性能得分</div>
                </div>

                <div class="status-text" id="status-text">准备就绪</div>
                <div class="sub-status" id="sub-status">点击开始按钮进行全方位硬件体检</div>

                <div class="progress-wrapper">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="grid-scores">
                    <div class="grid-item" id="card-cpu">
                        <div class="item-name">CPU 运算性能</div>
                        <div class="item-score" id="score-cpu">--</div>
                    </div>
                    <div class="grid-item" id="card-mem">
                        <div class="item-name">内存 读写速度</div>
                        <div class="item-score" id="score-mem">--</div>
                    </div>
                    <div class="grid-item" id="card-gpu">
                        <div class="item-name">GPU 3D图形</div>
                        <div class="item-score" id="score-gpu">--</div>
                    </div>
                </div>

                <button class="btn-start" id="start-btn" onclick="runFullBenchmark()">开始全面评测</button>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // === 全局状态与配置 ===
        const state = {
            scores: { cpu: 0, mem: 0, gpu: 0 },
            isRunning: false,
            stage: 'idle' // idle, cpu, mem, gpu, done
        };

        // === 硬件信息侦测 ===
        function detectHardware() {
            // OS & Browser
            const ua = navigator.userAgent;
            let os = "Unknown OS";
            if (ua.indexOf("Win") !== -1) os = "Windows";
            if (ua.indexOf("Mac") !== -1) os = "macOS";
            if (ua.indexOf("Linux") !== -1) os = "Linux";
            if (ua.indexOf("Android") !== -1) os = "Android";
            if (ua.indexOf("iPhone") !== -1) os = "iOS";
            document.getElementById('os-info').innerText = os + " / Chrome内核";

            // CPU Cores
            const cores = navigator.hardwareConcurrency || "未知";
            document.getElementById('cpu-info').innerText = `${cores} 线程`;

            // Memory (Rough estimate)
            const mem = navigator.deviceMemory ? `>=${navigator.deviceMemory} GB` : "无法获取";
            document.getElementById('mem-info').innerText = mem;

            // Resolution
            document.getElementById('res-info').innerText = `${window.screen.width} x ${window.screen.height}`;

            // GPU Renderer (WebAPI)
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                document.getElementById('gpu-info').innerText = renderer.replace(/ANGLE \((.*)\)/, '$1');
            } catch(e) {
                document.getElementById('gpu-info').innerText = "标准图形适配器";
            }
        }
        detectHardware();

        // === UI 工具函数 ===
        function setStatus(title, sub, progress) {
            document.getElementById('status-text').innerText = title;
            document.getElementById('sub-status').innerText = sub;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function activateCard(id) {
            document.querySelectorAll('.grid-item').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelector('.grid-scores').style.opacity = '1';
        }

        function updateScore(type, val) {
            const el = document.getElementById(`score-${type}`);
            let current = 0;
            const target = Math.floor(val);
            const interval = setInterval(() => {
                current += Math.ceil((target - current) / 5);
                if (current >= target) {
                    current = target;
                    clearInterval(interval);
                }
                el.innerText = current;
            }, 30);
        }

        // === 1. CPU 跑分逻辑 (矩阵运算 + 素数) ===
        // 使用 Matrix Rain 效果作为视觉反馈
        let matrixInterval;
        function startMatrixEffect() {
            const c = document.getElementById('matrix-canvas');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            c.style.opacity = 0.3;
            
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
            const fontSize = 14;
            const columns = c.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            matrixInterval = setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = "#0F0";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }, 33);
        }

        function stopMatrixEffect() {
            clearInterval(matrixInterval);
            document.getElementById('matrix-canvas').style.opacity = 0;
        }

        async function runCPUTest() {
            activateCard('card-cpu');
            setStatus("正在测试 CPU 运算能力...", "浮点运算 / 矩阵乘法 / 多线程模拟", 10);
            startMatrixEffect();

            // 模拟高负载：计算素数和Math.random
            const start = performance.now();
            let operations = 0;
            const duration = 3000; // 3秒压测

            await new Promise(resolve => {
                const loop = () => {
                    const now = performance.now();
                    if (now - start > duration) {
                        resolve();
                        return;
                    }
                    
                    // 密集计算块
                    for(let i=0; i<500000; i++) {
                        Math.sqrt(Math.random() * 10000);
                        operations++;
                    }
                    
                    // 更新进度条以保持动画流畅
                    const p = 10 + ((now - start) / duration) * 20; // 10% -> 30%
                    document.getElementById('progress-bar').style.width = `${p}%`;
                    
                    requestAnimationFrame(loop); // 防止UI卡死
                };
                loop();
            });

            stopMatrixEffect();
            
            // 计算分数：基准是 operations 数量
            // 假设现代中端CPU能跑多少，以此归一化
            const rawScore = operations / 100000; 
            state.scores.cpu = Math.floor(rawScore * (navigator.hardwareConcurrency || 4)); 
            updateScore('cpu', state.scores.cpu);
        }

        // === 2. 内存测试逻辑 ===
        async function runMemoryTest() {
            activateCard('card-mem');
            setStatus("正在测试内存读写速度...", "大块数据分配 / 数组遍历", 35);
            
            const start = performance.now();
            let count = 0;
            const duration = 2000;

            await new Promise(resolve => {
                const loop = () => {
                    const now = performance.now();
                    if (now - start > duration) {
                        resolve();
                        return;
                    }

                    // 内存压力测试：快速创建和读写数组
                    // 注意：Web端不能分配太大，否则崩
                    try {
                        const size = 100000;
                        const arr = new Float32Array(size);
                        for(let k=0; k<size; k+=10) {
                            arr[k] = Math.random();
                        }
                        count++;
                    } catch(e) {}

                    const p = 30 + ((now - start) / duration) * 20; // 30% -> 50%
                    document.getElementById('progress-bar').style.width = `${p}%`;
                    
                    // 稍微delay一下让GC有机会工作
                    setTimeout(loop, 0); 
                };
                loop();
            });

            // 评分
            state.scores.mem = Math.floor(count * 50);
            updateScore('mem', state.scores.mem);
        }

        // === 3. GPU 测试逻辑 (Three.js) ===
        let renderer, scene, camera, mesh, particles;
        let gpuRunning = false;
        let gpuFrameCount = 0;
        let gpuStartTime = 0;

        function init3D() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 强制渲染分辨率为1.5倍以增加压力 (如果是高分屏则保持1.0)
            const ratio = window.devicePixelRatio > 1 ? window.devicePixelRatio : 1.5;
            renderer.setPixelRatio(ratio);
            container.appendChild(renderer.domElement);

            // 核心物体 - 复杂扭结
            const geo = new THREE.TorusKnotGeometry(10, 3, 300, 64); // 增加面数
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x00f3ff, roughness: 0.2, metalness: 0.8, 
                emissive: 0x111111 
            });
            mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);

            // 粒子系统 - 增加数量到8000
            const pGeo = new THREE.BufferGeometry();
            const pCount = 8000;
            const posArray = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) {
                posArray[i] = (Math.random() - 0.5) * 200;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const pMat = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff });
            particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // 灯光 - 3个点光源
            const l1 = new THREE.PointLight(0xff0055, 2, 100);
            l1.position.set(20, 20, 20);
            scene.add(l1);
            const l2 = new THREE.PointLight(0x00f3ff, 2, 100);
            l2.position.set(-20, -20, 20);
            scene.add(l2);
            scene.add(new THREE.AmbientLight(0x404040));
        }

        function runGPULoop() {
            if(!gpuRunning) return;
            requestAnimationFrame(runGPULoop);
            
            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.02;
            particles.rotation.y -= 0.001;
            
            renderer.render(scene, camera);
            gpuFrameCount++;
        }

        async function runGPUTest() {
            activateCard('card-gpu');
            document.getElementById('canvas-container').style.opacity = 1;
            setStatus("正在测试 GPU 图形性能...", "WebGL 高负载渲染 / 动态光照 / 粒子计算", 55);

            init3D();
            gpuRunning = true;
            gpuFrameCount = 0;
            gpuStartTime = performance.now();
            runGPULoop();

            const duration = 5000; // 5秒

            await new Promise(resolve => {
                const check = () => {
                    const now = performance.now();
                    const elapsed = now - gpuStartTime;
                    
                    if (elapsed > duration) {
                        resolve();
                        return;
                    }
                    
                    const p = 50 + (elapsed / duration) * 40; // 50% -> 90%
                    document.getElementById('progress-bar').style.width = `${p}%`;
                    
                    setTimeout(check, 100);
                };
                check();
            });

            gpuRunning = false;
            document.getElementById('canvas-container').style.opacity = 0.2; // 变暗但不消失

            // 评分：FPS * 分辨率系数
            const fps = gpuFrameCount / (duration / 1000);
            const pixelFactor = (window.innerWidth * window.innerHeight) / 2073600; // 相对于1080p
            state.scores.gpu = Math.floor(fps * 150 * Math.sqrt(pixelFactor));
            updateScore('gpu', state.scores.gpu);
        }

        // === 主流程 ===
        async function runFullBenchmark() {
            if(state.isRunning) return;
            state.isRunning = true;
            document.getElementById('start-btn').disabled = true;
            
            // 重置
            state.scores = { cpu: 0, mem: 0, gpu: 0 };
            document.getElementById('score-cpu').innerText = "--";
            document.getElementById('score-mem').innerText = "--";
            document.getElementById('score-gpu').innerText = "--";
            document.getElementById('main-score').innerText = "0";

            // 1. CPU
            await runCPUTest();
            
            // 2. Memory
            await runMemoryTest();
            
            // 3. GPU
            await runGPUTest();

            // 4. 结算
            finishBenchmark();
        }

        function finishBenchmark() {
            document.getElementById('progress-bar').style.width = "100%";
            const total = state.scores.cpu + state.scores.mem + state.scores.gpu;
            
            // 动画显示总分
            const el = document.getElementById('main-score');
            let current = 0;
            const interval = setInterval(() => {
                current += Math.ceil((total - current) / 10);
                if (current >= total) {
                    current = total;
                    clearInterval(interval);
                    showFinalResult(total);
                }
                el.innerText = current;
            }, 30);
        }

        function showFinalResult(score) {
            let rank = "入门级办公配置";
            let beat = 10;
            let color = "#aaa";

            if (score > 5000) { rank = "高性能家用PC"; beat = 40; color = "#00ff88"; }
            if (score > 10000) { rank = "发烧级电竞主机"; beat = 70; color = "#00f3ff"; }
            if (score > 20000) { rank = "旗舰级性能怪兽"; beat = 95; color = "#ff0055"; }
            if (score > 30000) { rank = "天顶星科技"; beat = 99; color = "gold"; }

            // 娱乐性文案
            setStatus(`评测完成！击败了全国 ${beat}% 的用户`, `当前设备评级: ${rank}`, 100);
            document.getElementById('status-text').style.color = color;
            
            state.isRunning = false;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').innerText = "重新测试";
        }
    </script>
</body>
</html>
