<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 顶部提示框 (Toast) -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2">
        <i class="fas fa-check-circle text-green-400"></i>
        <span>发送成功！可以继续上传</span>
    </div>

    <!-- 卡片容器 -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden relative">
        
        <!-- 头部 -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold"><i class="fas fa-paper-plane mr-2"></i>看看你的</h1>
            <p class="text-blue-100 text-sm mt-1">照片将直接发送给我</p>
        </div>

        <!-- 
            表单配置：
            我们移除了 action 属性，改用 JS 的 AJAX 提交，
            这样就不会发生页面跳转了。
        -->
        <form id="uploadForm" class="p-6 space-y-6">
            
            <!-- FormSubmit 配置参数 -->
            <input type="hidden" name="_subject" value="新照片上传 (KKP)">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false"> 

            <!-- 1. 拍照/上传区域 -->
            <div id="uploadArea">
                <input type="file" id="fileInput" name="attachment" accept="image/*" class="hidden" required>
                
                <div onclick="document.getElementById('fileInput').click()" 
                     class="cursor-pointer border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 h-40 flex flex-col items-center justify-center hover:bg-gray-100 transition-colors active:bg-gray-200">
                    <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-3 text-blue-500">
                        <i class="fas fa-camera text-3xl"></i>
                    </div>
                    <span class="text-gray-500 font-medium">点击拍照或选择照片</span>
                </div>
            </div>

            <!-- 2. 预览与信息填写区域 (默认隐藏) -->
            <div id="previewArea" class="hidden space-y-4">
                
                <!-- 图片预览 -->
                <div class="relative rounded-lg overflow-hidden border border-gray-200 bg-gray-50">
                    <img id="imgPreview" class="w-full h-56 object-contain" src="">
                    <button type="button" onclick="resetForm()" class="absolute top-2 right-2 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <!-- 署名输入框 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">我是谁 (可选)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="name" placeholder="留下你的大名..." 
                               class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                    <span>确认发送</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <!-- 遮罩层 (发送时显示) -->
            <div id="loadingOverlay" class="absolute inset-0 bg-white/80 hidden items-center justify-center z-10">
                <div class="text-center">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-blue-600 mb-2"></i>
                    <p class="text-gray-600 font-medium">正在传输...</p>
                </div>
            </div>

        </form>

        <div class="bg-gray-50 p-3 text-center text-xs text-gray-400 border-t border-gray-100">
            Powered by FormSubmit
        </div>
    </div>

    <script>
        // ==========================================
        // 配置您的邮箱
        // ==========================================
        const MY_EMAIL = "test20260117z@outlook.com"; 
        // ==========================================

        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewArea = document.getElementById('previewArea');
        const imgPreview = document.getElementById('imgPreview');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toast = document.getElementById('toast');

        // 1. 选择图片后显示预览
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 15 * 1024 * 1024) {
                alert("图片太大了 (请小于15MB)");
                this.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                imgPreview.src = e.target.result;
                uploadArea.classList.add('hidden');
                previewArea.classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        });

        // 2. 重置表单
        window.resetForm = function() {
            fileInput.value = "";
            document.querySelector('input[name="name"]').value = "";
            uploadArea.classList.remove('hidden');
            previewArea.classList.add('hidden');
            loadingOverlay.classList.add('hidden'); // 确保遮罩关闭
            submitBtn.disabled = false;
        };

        // 3. 提示框控制
        function showToast(message, isError = false) {
            toast.innerHTML = isError ? 
                `<i class="fas fa-times-circle text-red-400"></i><span>${message}</span>` : 
                `<i class="fas fa-check-circle text-green-400"></i><span>${message}</span>`;
            
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // 4. AJAX 提交处理
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止默认跳转

            // 显示加载状态
            submitBtn.disabled = true;
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('flex');

            const formData = new FormData(form);

            // 使用 AJAX 接口提交
            fetch(`https://formsubmit.co/ajax/${MY_EMAIL}`, {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.success === "true" || data.success === true || !data.error) {
                    // 发送成功
                    showToast("发送成功！");
                    resetForm(); // 直接重置，准备发下一张
                } else {
                    // 逻辑错误
                    throw new Error(data.message || "发送失败");
                }
            })
            .catch(error => {
                console.error(error);
                showToast("发送失败，请重试", true);
                loadingOverlay.classList.add('hidden'); // 仅隐藏遮罩，不重置表单以便重试
                loadingOverlay.classList.remove('flex');
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
