<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>看看你的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #1a1a1a;
            background-image: radial-gradient(circle at 50% 0%, #4a0418 0%, #1a1a1a 70%);
        }
        h1 { font-family: 'Noto Serif SC', serif; letter-spacing: 0.1em; }
        
        /* 霓虹光晕效果 */
        .neon-glow {
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3);
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(251, 113, 133, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-gray-200">

    <!-- 卡片容器 (深色玻璃质感) -->
    <div class="w-full max-w-md bg-gray-900/90 backdrop-blur-md rounded-xl shadow-2xl border border-rose-900/50 overflow-hidden relative">
        
        <!-- 装饰性光斑 -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-rose-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>

        <!-- 头部 -->
        <div class="bg-gradient-to-r from-rose-900 to-pink-900 p-8 text-center relative z-10 border-b border-rose-800/30">
            <h1 class="text-2xl font-bold text-rose-100 neon-text"><i class="fas fa-heart text-rose-500 mr-2 animate-pulse"></i>看看你的</h1>
            <p class="text-rose-200/70 text-xs mt-2 font-light tracking-widest">CAN CAN NEEDT</p>
        </div>

        <!-- 
            原生 Form 提交 
        -->
        <form id="uploadForm" 
              action="https://formsubmit.co/test20260117z@outlook.com" 
              method="POST" 
              enctype="multipart/form-data"
              class="p-6 space-y-8 relative z-10">
            
            <!-- FormSubmit 配置参数 -->
            <input type="hidden" name="_subject" value="新照片">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false"> 

            <!-- 1. 拍照/上传区域 -->
            <div id="uploadArea">
                <input type="file" id="fileInput" name="attachment" accept="image/*" class="hidden" required>
                
                <div onclick="document.getElementById('fileInput').click()" 
                     class="cursor-pointer border border-dashed border-rose-700/40 rounded-xl bg-gray-800/50 h-48 flex flex-col items-center justify-center hover:bg-rose-900/10 hover:border-rose-500/60 transition-all active:scale-98 group">
                    <div class="w-16 h-16 bg-gradient-to-tr from-rose-600 to-pink-500 rounded-full shadow-lg neon-glow flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-500">
                        <i class="fas fa-camera text-2xl text-white"></i>
                    </div>
                    <span class="text-rose-200/80 font-medium text-sm tracking-wide">看看你的</span>
                    <span class="text-rose-200/30 text-xs mt-1 transform scale-90">支持直接拍照</span>
                </div>
            </div>

            <!-- 2. 预览与信息填写区域 (默认隐藏) -->
            <div id="previewArea" class="hidden space-y-6">
                
                <!-- 图片预览 -->
                <div class="relative rounded-lg overflow-hidden border border-rose-800/30 bg-black/40 shadow-inner">
                    <img id="imgPreview" class="w-full h-64 object-contain opacity-90" src="">
                    <div class="absolute inset-0 pointer-events-none bg-gradient-to-t from-black/60 to-transparent"></div>
                    <button type="button" onclick="resetForm()" class="absolute top-2 right-2 bg-black/60 text-rose-400 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors border border-rose-500/30">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <!-- 署名输入框 -->
                <div>
                    <label class="block text-xs font-medium text-rose-300/70 mb-2 ml-1 uppercase tracking-wider">Your Name</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user-secret text-rose-500/50 group-focus-within:text-rose-500 transition-colors"></i>
                        </div>
                        <input type="text" name="name" placeholder="神秘人..." 
                               class="block w-full pl-10 pr-3 py-3 bg-gray-800/50 border border-rose-900/50 rounded-lg text-rose-100 placeholder-rose-700/30 focus:ring-1 focus:ring-rose-500 focus:border-rose-500 outline-none transition-all">
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-rose-700 to-pink-600 hover:from-rose-600 hover:to-pink-500 text-white py-3.5 rounded-lg font-bold shadow-lg neon-glow active:scale-95 transition-all flex justify-center items-center gap-2 text-sm tracking-widest uppercase">
                    <span>发送照片</span>
                    <i class="fas fa-paper-plane text-xs opacity-70"></i>
                </button>
                
                <p class="text-[10px] text-center text-rose-500/40">点击发送后，请耐心等待跳转确认</p>
            </div>

        </form>

        <div class="bg-black/20 p-3 text-center text-[10px] text-rose-900/40 border-t border-rose-900/20">
            PRIVATE & SECURE UPLOAD
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewArea = document.getElementById('previewArea');
        const imgPreview = document.getElementById('imgPreview');
        const submitBtn = document.getElementById('submitBtn');

        // 选择图片后显示预览
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 15 * 1024 * 1024) {
                alert("图片太大了 (请小于15MB)");
                this.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                imgPreview.src = e.target.result;
                uploadArea.classList.add('hidden');
                previewArea.classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        });

        // 重置表单
        window.resetForm = function() {
            fileInput.value = "";
            document.querySelector('input[name="name"]').value = "";
            uploadArea.classList.remove('hidden');
            previewArea.classList.add('hidden');
        };

        // 提交时的加载动画
        document.getElementById('uploadForm').addEventListener('submit', function() {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 正在传输...';
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
        });
    </script>
</body>
</html>
