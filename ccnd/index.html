<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KKP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 卡片容器 -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- 头部 -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-xl font-bold"><i class="fas fa-paper-plane mr-2"></i>看看你的</h1>
            <p class="text-blue-100 text-sm mt-1">照片将直接发送到我的邮箱</p>
        </div>

        <!-- 
            核心修改：使用原生 Form 提交 
            1. action: 指向您的邮箱
            2. method: POST
            3. enctype: 必须有，否则发不了文件
        -->
        <form id="uploadForm" 
              action="https://formsubmit.co/test20260117z@outlook.com" 
              method="POST" 
              enctype="multipart/form-data"
              class="p-6 space-y-6">
            
            <!-- FormSubmit 配置参数 -->
            <input type="hidden" name="_subject" value="新照片上传 (KKP)">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false"> <!-- 建议先关掉，如果还是收不到，可以删掉这一行开启验证码 -->
            <!-- 发送成功后自动返回这个页面 (可选，如果不加会显示FormSubmit的广告页) -->
            <!-- <input type="hidden" name="_next" value="http://你的网址..."> -->

            <!-- 1. 拍照/上传区域 -->
            <div id="uploadArea">
                <input type="file" id="fileInput" name="attachment" accept="image/*" class="hidden" required>
                
                <div onclick="document.getElementById('fileInput').click()" 
                     class="cursor-pointer border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 h-40 flex flex-col items-center justify-center hover:bg-gray-100 transition-colors active:bg-gray-200">
                    <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-3 text-blue-500">
                        <i class="fas fa-camera text-3xl"></i>
                    </div>
                    <span class="text-gray-500 font-medium">点击拍照或选择照片</span>
                </div>
            </div>

            <!-- 2. 预览与信息填写区域 (默认隐藏) -->
            <div id="previewArea" class="hidden space-y-4">
                
                <!-- 图片预览 -->
                <div class="relative rounded-lg overflow-hidden border border-gray-200 bg-gray-50">
                    <img id="imgPreview" class="w-full h-56 object-contain" src="">
                    <button type="button" onclick="resetForm()" class="absolute top-2 right-2 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <!-- 新增：署名输入框 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">我是谁 (可选)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="name" placeholder="留下你的大名..." 
                               class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                    <span>确认发送</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
                
                <p class="text-xs text-center text-gray-400">点击发送后请耐心等待跳转</p>
            </div>

        </form>

        <div class="bg-gray-50 p-3 text-center text-xs text-gray-400 border-t border-gray-100">
            Powered by FormSubmit
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewArea = document.getElementById('previewArea');
        const imgPreview = document.getElementById('imgPreview');
        const submitBtn = document.getElementById('submitBtn');

        // 选择图片后显示预览
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 限制文件大小提示
            if (file.size > 15 * 1024 * 1024) {
                alert("图片太大了 (请小于15MB)");
                this.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                imgPreview.src = e.target.result;
                uploadArea.classList.add('hidden');
                previewArea.classList.remove('hidden');
            }
            reader.readAsDataURL(file);
        });

        // 重置表单
        window.resetForm = function() {
            fileInput.value = "";
            // 清空名字输入
            document.querySelector('input[name="name"]').value = "";
            uploadArea.classList.remove('hidden');
            previewArea.classList.add('hidden');
        };

        // 提交时的简单加载动画
        document.getElementById('uploadForm').addEventListener('submit', function() {
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 正在上传...';
            submitBtn.classList.add('opacity-75');
        });
    </script>
</body>
</html>
