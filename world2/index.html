<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lulu World</title>
    <link rel="stylesheet" href="../shared/world-app.css">
</head>
<body data-api-base="/api">
    <div id="ui-layer">
        <div id="fps-hud">-- FPS</div>
        <div id="top-bar">
            <div class="hud-box">
                POS: <span id="pos-display">0, 0</span>
                <div id="biome-display">Unknown Lands</div>
            </div>
            <div id="minimap-container">
                <div id="minimap-arrow"></div>
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="glide-hint">GLIDING</div>

        <div id="bottom-bar">
            <div class="avatar-diamond">
                <span>M</span>
            </div>
            <div class="bars">
                <div class="bar-container"><div id="hp-bar" class="bar-fill" style="width: 80%"></div></div>
                <div class="bar-container"><div id="stamina-bar" class="bar-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="pause-menu">
        <h1 id="pause-title">LULU WORLD</h1>
        <p id="pause-subtitle">without lulu</p>
        <button id="start-btn">EXPLORE</button>
        <div class="key-hint">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> MOVE <br>
            <kbd>SPACE</kbd> JUMP / HOLD TO GLIDE <br>
            <kbd>SHIFT</kbd> RUN &nbsp; <kbd>MOUSE</kbd> LOOK
        </div>
    </div>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script defer src="../shared/world-app.js"></script>
</body>
</html>
