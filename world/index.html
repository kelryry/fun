<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ethereal Lands - Gliding Update</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #A0D8EF; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #top-bar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .hud-box {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            color: #333;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-weight: 800;
            letter-spacing: 1px;
        }

        #minimap-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }
        
        #minimap-arrow {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 14px solid #FF5252;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        /* --- 新版 UI: 纪念碑谷风格 --- */
        #bottom-bar {
            padding: 50px;
            display: flex;
            align-items: center; /* 居中对齐 */
            gap: 30px;
        }

        /* 几何菱形头像 */
        .avatar-diamond {
            width: 60px;
            height: 60px;
            background: #FF6B6B;
            border: 4px solid #fff;
            transform: rotate(45deg); /* 旋转 */
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1); /* 硬阴影 */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 反转文字旋转，使其正立 */
        .avatar-diamond span {
            transform: rotate(-45deg);
            font-size: 24px;
            font-weight: 900;
            color: #fff;
        }

        .bars {
            flex-grow: 1;
            max-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bar-container {
            width: 100%;
            height: 14px;
            background: rgba(255,255,255,0.5);
            border: 2px solid #fff; /* 白色描边 */
            overflow: visible; /* 允许阴影溢出 */
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1); /* 硬阴影 */
        }

        .bar-fill { 
            height: 100%; 
            transition: width 0.2s; 
        }
        
        /* 扁平化配色 */
        #hp-bar { background: #FF6B6B; }
        #stamina-bar { background: #4ECDC4; }
        
        #biome-display { font-size: 14px; color: #555; text-transform: uppercase; margin-top: 5px; font-weight: bold;}

        /* 滑翔提示 */
        #glide-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }

        #pause-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(240, 248, 255, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #444;
            z-index: 100;
            transition: opacity 0.4s;
            pointer-events: auto;
        }
        
        button {
            padding: 18px 60px;
            font-size: 20px;
            background: #4ECDC4;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.2s;
            box-shadow: 0 10px 25px rgba(78, 205, 196, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 30px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(78, 205, 196, 0.5); }
        button:active { transform: scale(0.95); }

        .key-hint {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
            text-align: center;
            line-height: 2.2;
            font-weight: 600;
        }
        kbd {
            background: white;
            color: #555;
            padding: 5px 10px;
            border-radius: 8px;
            box-shadow: 0 2px 0 #ddd;
            font-family: 'Segoe UI', monospace;
            font-weight: bold;
            margin: 0 5px;
            border: 1px solid #eee;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="top-bar">
            <div class="hud-box">
                POS: <span id="pos-display">0, 0</span>
                <div id="biome-display">Unknown Lands</div>
            </div>
            <div id="minimap-container">
                <div id="minimap-arrow"></div>
            </div>
        </div>

        <div id="crosshair"></div>
        <div id="glide-hint">GLIDING</div>

        <div id="bottom-bar">
            <!-- 新版几何头像 -->
            <div class="avatar-diamond">
                <span>M</span>
            </div>
            <div class="bars">
                <div class="bar-container"><div id="hp-bar" class="bar-fill" style="width: 80%"></div></div>
                <div class="bar-container"><div id="stamina-bar" class="bar-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="pause-menu">
        <h1 style="font-size: 72px; margin-bottom: 0px; letter-spacing: -2px; color: #FF6B6B;">LULU WORLD</h1>
        <p style="margin-bottom: 20px; color: #4ECDC4; font-size: 24px; letter-spacing: 4px; font-weight: bold;">without lulu</p>
        <button id="start-btn">EXPLORE</button>
        <div class="key-hint">
            <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> MOVE <br>
            <kbd>SPACE</kbd> JUMP / HOLD TO GLIDE <br>
            <kbd>SHIFT</kbd> RUN &nbsp; <kbd>MOUSE</kbd> LOOK
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

    <script>
        // --- 核心配置 ---
        const config = {
            chunkSize: 1600,     
            res: 256,            
            viewDistance: 900,   
            gravity: 50.0,
            speed: 18.0,         
            runSpeed: 40.0,      
            jumpForce: 25.0,     
            eyeHeight: 3.0,
            minimapCamSize: 300,
            glideGravity: 5.0,    // 滑翔时的低重力
            glideSpeed: 25.0      // 滑翔时的基础速度
        };

        // --- 全局变量 ---
        let scene, camera, renderer, controls;
        let mapCamera;
        let clock = new THREE.Clock();
        let noise = new SimplexNoise(); 
        let moistureNoise = new SimplexNoise();
        
        let playerVelocity = new THREE.Vector3();
        let playerDirection = new THREE.Vector3();
        let isGrounded = false;
        let canJump = false;
        let isRunning = false;
        let isGliding = false; // 新增滑翔状态
        let stamina = 100;
        let gameActive = false;
        
        let terrainMesh, waterMesh;
        let cloudGroup;
        const obstacles = []; 

        const keyState = { forward: false, backward: false, left: false, right: false, jump: false };

        // --- 色彩配置 ---
        const Palette = {
            Water: new THREE.Color(0x40E0D0), 
            Sky: new THREE.Color(0xA0D8EF),   
            Sand: new THREE.Color(0xFFCC80),      
            GrassLight: new THREE.Color(0x90EE90), 
            GrassDark: new THREE.Color(0x2E8B57),  
            RockRed: new THREE.Color(0xCD5C5C),    
            RockGrey: new THREE.Color(0x708090),   
            Snow: new THREE.Color(0xFFFAFA),       
            TreeGreen: new THREE.Color(0x00A86B),  
            TreePink: new THREE.Color(0xFF69B4),   
            Cactus: new THREE.Color(0x3CB371),     
            Stone: new THREE.Color(0xA9A9A9)       
        };

        function getBiome(y, moisture) {
            if (y < 2) return 'Beach';
            if (y > 70) return 'Snow';
            if (y > 45) return 'Mountain';
            if (moisture < -0.25) return 'Desert';
            if (moisture < 0.2) return 'Grassland';
            return 'Forest';
        }

        // --- Shader: 几何水晶水面 (更透明) ---
        const WaterShader = {
            uniforms: {
                time: { value: 0 },
                color: { value: Palette.Water },
                sunDirection: { value: new THREE.Vector3(0.5, 0.8, 0.3).normalize() }
            },
            vertexShader: `
                uniform float time;
                varying vec3 vPos;
                varying float vElevation;
                
                float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }

                void main() {
                    vec3 pos = position;
                    float wave1 = sin(pos.x * 0.05 + time * 1.2) * 0.8;
                    float wave2 = cos(pos.z * 0.04 + time * 1.0) * 0.8;
                    float noise = random(pos.xz) * 0.2;
                    float totalWave = wave1 + wave2 + noise;
                    pos.y += totalWave;
                    vPos = (modelMatrix * vec4(pos, 1.0)).xyz;
                    vElevation = totalWave;
                    gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                uniform vec3 sunDirection;
                varying vec3 vPos;
                varying float vElevation;

                void main() {
                    vec3 dx = dFdx(vPos);
                    vec3 dy = dFdy(vPos);
                    vec3 normal = normalize(cross(dx, dy));

                    float diff = max(dot(normal, sunDirection), 0.0);
                    vec3 viewDir = normalize(cameraPosition - vPos);
                    vec3 reflectDir = reflect(-sunDirection, normal);
                    float spec = pow(max(dot(viewDir, reflectDir), 0.0), 40.0); 

                    vec3 deepColor = vec3(0.0, 0.4, 0.6);
                    vec3 shallowColor = color + vec3(0.15); // 稍微提亮一点
                    
                    vec3 finalColor = mix(deepColor, shallowColor, diff * 0.5 + 0.5);
                    finalColor += vec3(1.0) * spec * 0.7;

                    // 修改透明度: 从 0.6 降到 0.4，更加通透
                    gl_FragColor = vec4(finalColor, 0.4); 
                }
            `
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = Palette.Sky;
            scene.fog = new THREE.Fog(Palette.Sky, 50, config.viewDistance);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            const fs = config.minimapCamSize;
            mapCamera = new THREE.OrthographicCamera(fs / -2, fs / 2, fs / 2, fs / -2, 1, 1000);
            mapCamera.up.set(0, 0, -1);
            mapCamera.lookAt(0, -1, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.autoClear = false;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1; 
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);
            setupUIControls();

            setupLights();
            generateWorld();
            generateClouds();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            animate();
        }

        function setupUIControls() {
            const blocker = document.getElementById('pause-menu');
            const startBtn = document.getElementById('start-btn');
            startBtn.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => {
                blocker.style.opacity = 0;
                setTimeout(() => blocker.style.display = 'none', 300);
                gameActive = true;
            });
            controls.addEventListener('unlock', () => {
                blocker.style.display = 'flex';
                setTimeout(() => blocker.style.opacity = 1, 10);
                gameActive = false;
            });
        }

        function setupLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0xAAEEFF, 0.4);
            hemiLight.position.set(0, 200, 0);
            scene.add(hemiLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.1);
            sunLight.position.set(200, 300, 100);
            sunLight.castShadow = true;
            
            sunLight.shadow.mapSize.width = 4096;
            sunLight.shadow.mapSize.height = 4096;
            const d = 500;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            sunLight.shadow.bias = -0.00005;
            scene.add(sunLight);
        }

        function generateWorld() {
            const size = config.chunkSize;
            const res = config.res; 
            const geometry = new THREE.PlaneGeometry(size, size, res, res);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            const colors = [];
            const count = pos.count;

            for (let i = 0; i < count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);

                let y = noise.noise2D(x * 0.002, z * 0.002) * 80;
                y += noise.noise2D(x * 0.01, z * 0.01) * 20;
                y += noise.noise2D(x * 0.03, z * 0.03) * 5; 
                
                let moisture = moistureNoise.noise2D(x * 0.003 + 1000, z * 0.003 + 1000); 

                const dist = Math.sqrt(x*x + z*z);
                if (dist < 50) y = y * (dist/50);

                pos.setY(i, y);

                let color = new THREE.Color();
                const biome = getBiome(y, moisture);

                if (biome === 'Beach') color.set(Palette.Sand);
                else if (biome === 'Desert') color.set(Palette.Sand);
                else if (biome === 'Grassland') color.set(Palette.GrassLight);
                else if (biome === 'Forest') color.set(Palette.GrassDark);
                else if (biome === 'Mountain') color.set(Palette.RockRed); 
                else if (biome === 'Snow') color.set(Palette.Snow);

                colors.push(color.r, color.g, color.b);
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals(); 

            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                flatShading: true,
                roughness: 0.9,
                metalness: 0.0
            });

            terrainMesh = new THREE.Mesh(geometry, material);
            terrainMesh.receiveShadow = true;
            terrainMesh.castShadow = true;
            scene.add(terrainMesh);

            const waterGeo = new THREE.PlaneGeometry(size, size, 128, 128);
            waterGeo.rotateX(-Math.PI / 2);
            
            const waterMat = new THREE.ShaderMaterial({
                uniforms: THREE.UniformsUtils.clone(WaterShader.uniforms),
                vertexShader: WaterShader.vertexShader,
                fragmentShader: WaterShader.fragmentShader,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false, 
                blending: THREE.NormalBlending
            });
            
            waterMesh = new THREE.Mesh(waterGeo, waterMat);
            waterMesh.position.y = -2;
            scene.add(waterMesh);

            generateObjects();
        }

        function generateObjects() {
            const raycaster = new THREE.Raycaster();
            const down = new THREE.Vector3(0, -1, 0);
            
            const matTrunk = new THREE.MeshStandardMaterial({ color: 0x8B4513, flatShading: true });
            const matPine = new THREE.MeshStandardMaterial({ color: Palette.TreeGreen, flatShading: true });
            const matPink = new THREE.MeshStandardMaterial({ color: Palette.TreePink, flatShading: true });
            const matCactus = new THREE.MeshStandardMaterial({ color: Palette.Cactus, flatShading: true });
            const matStone = new THREE.MeshStandardMaterial({ color: Palette.Stone, flatShading: true });
            const matSnowRock = new THREE.MeshStandardMaterial({ color: 0xE0FFFF, flatShading: true });

            const attemptCount = 1500; 

            for(let i=0; i<attemptCount; i++) {
                const x = (Math.random() - 0.5) * (config.chunkSize * 0.8);
                const z = (Math.random() - 0.5) * (config.chunkSize * 0.8);

                if (Math.sqrt(x*x + z*z) < 20) continue; 

                raycaster.set(new THREE.Vector3(x, 200, z), down);
                const intersects = raycaster.intersectObject(terrainMesh);

                if (intersects.length > 0) {
                    const y = intersects[0].point.y;
                    const moisture = moistureNoise.noise2D(x * 0.003 + 1000, z * 0.003 + 1000);
                    const biome = getBiome(y, moisture);

                    if (biome === 'Desert') {
                        if (Math.random() > 0.6) createCactus(x, y, z, matCactus);
                        else createRock(x, y, z, matStone, 0.5); 
                    }
                    else if (biome === 'Forest') {
                        createPineTree(x, y, z, matTrunk, matPine);
                    }
                    else if (biome === 'Grassland') {
                        const mat = Math.random() > 0.7 ? matPink : matPine;
                        createRoundTree(x, y, z, matTrunk, mat);
                    }
                    else if (biome === 'Mountain' || biome === 'Snow') {
                        const mat = biome === 'Snow' ? matSnowRock : matStone;
                        createRock(x, y, z, mat, 1.5);
                    }
                }
            }
        }

        function createPineTree(x, y, z, matTrunk, matLeaf) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 2.5, 6), matTrunk);
            trunk.position.y = 1.25;
            group.add(trunk);

            for(let i=0; i<3; i++) {
                const s = 2.5 - i * 0.7;
                const cone = new THREE.Mesh(new THREE.CylinderGeometry(0, s, 2.5, 7), matLeaf);
                cone.position.y = 2.5 + i * 1.5;
                group.add(cone);
            }
            finalizeObject(group, x, y, z, 1.0);
        }

        function createRoundTree(x, y, z, matTrunk, matLeaf) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2, 6), matTrunk);
            trunk.position.y = 1;
            group.add(trunk);
            const leaf = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 1), matLeaf);
            leaf.position.y = 3;
            group.add(leaf);
            finalizeObject(group, x, y, z, 0.8 + Math.random()*0.5);
        }

        function createCactus(x, y, z, mat) {
            const group = new THREE.Group();
            const mainH = 2 + Math.random();
            const main = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, mainH, 7), mat);
            main.position.y = mainH / 2;
            const top = new THREE.Mesh(new THREE.SphereGeometry(0.4, 7, 7), mat);
            top.position.y = mainH;
            group.add(main);
            group.add(top);

            if (Math.random() > 0.3) {
                const armH = 1;
                const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, armH, 6), mat);
                arm.position.set(0.5, mainH*0.6, 0);
                arm.rotation.z = -Math.PI / 4;
                group.add(arm);
            }
            finalizeObject(group, x, y, z, 1.0);
        }

        function createRock(x, y, z, mat, scaleMult) {
            const geo = new THREE.DodecahedronGeometry(1, 0);
            const mesh = new THREE.Mesh(geo, mat);
            const s = (1 + Math.random()) * scaleMult;
            mesh.scale.set(s, s*0.8, s);
            mesh.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
            mesh.position.set(x, y + s*0.3, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            obstacles.push({x, z, r: s*0.8});
        }

        function finalizeObject(group, x, y, z, scale) {
            group.position.set(x, y, z);
            group.scale.set(scale, scale, scale);
            group.rotation.y = Math.random() * Math.PI * 2;
            group.traverse(o => { if(o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
            scene.add(group);
            obstacles.push({x, z, r: 0.8 * scale});
        }

        function generateClouds() {
            cloudGroup = new THREE.Group();
            const cloudGeo = new THREE.BoxGeometry(1, 1, 1);
            const cloudMat = new THREE.MeshStandardMaterial({ 
                color: 0xFFFFFF, 
                flatShading: true, 
                opacity: 0.85, 
                transparent: true 
            });

            const range = config.chunkSize * 0.8;

            for(let i=0; i<40; i++) {
                const cloud = new THREE.Group();
                const blocks = 3 + Math.floor(Math.random()*4);
                for(let b=0; b<blocks; b++) {
                    const mesh = new THREE.Mesh(cloudGeo, cloudMat);
                    mesh.position.set(
                        (Math.random()-0.5)*18, 
                        (Math.random()-0.5)*5, 
                        (Math.random()-0.5)*12
                    );
                    const s = 8 + Math.random()*12;
                    mesh.scale.set(s, s*0.6, s);
                    cloud.add(mesh);
                }
                
                cloud.position.set(
                    (Math.random()-0.5) * range,
                    100 + Math.random()*50,
                    (Math.random()-0.5) * range
                );
                cloudGroup.add(cloud);
            }
            scene.add(cloudGroup);
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW': keyState.forward = true; break;
                case 'KeyA': keyState.left = true; break;
                case 'KeyS': keyState.backward = true; break;
                case 'KeyD': keyState.right = true; break;
                case 'Space': 
                    if (isGrounded) {
                        playerVelocity.y = config.jumpForce;
                        isGrounded = false;
                        canJump = false; // 已跳跃
                    } else {
                        // 如果在空中按下，开启滑翔
                        isGliding = true;
                    }
                    break;
                case 'ShiftLeft': isRunning = true; break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': keyState.forward = false; break;
                case 'KeyA': keyState.left = false; break;
                case 'KeyS': keyState.backward = false; break;
                case 'KeyD': keyState.right = false; break;
                case 'Space': 
                    canJump = true; // 重置起跳许可（用于逻辑判断）
                    isGliding = false; // 松开空格停止滑翔
                    break;
                case 'ShiftLeft': isRunning = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updatePlayer(dt) {
            if (controls.isLocked) {
                if (isRunning && (keyState.forward || keyState.backward || keyState.left || keyState.right)) {
                    stamina = Math.max(0, stamina - 25 * dt);
                    if (stamina <= 0) isRunning = false;
                } else {
                    stamina = Math.min(100, stamina + 15 * dt);
                }
                document.getElementById('stamina-bar').style.width = stamina + '%';

                playerDirection.z = Number(keyState.forward) - Number(keyState.backward);
                playerDirection.x = Number(keyState.right) - Number(keyState.left);
                playerDirection.normalize();

                // 速度计算：如果在滑翔，给予基础滑翔速度，否则根据跑/走决定
                let speed = isRunning ? config.runSpeed : config.speed;
                if (isGliding && !isGrounded) {
                    speed = Math.max(speed, config.glideSpeed); 
                }

                if (keyState.forward || keyState.backward) playerVelocity.z -= playerDirection.z * speed * 10.0 * dt;
                if (keyState.left || keyState.right) playerVelocity.x -= playerDirection.x * speed * 10.0 * dt;
            }

            playerVelocity.x -= playerVelocity.x * 10.0 * dt;
            playerVelocity.z -= playerVelocity.z * 10.0 * dt;

            // --- 重力与滑翔逻辑 ---
            if (isGliding && !isGrounded && playerVelocity.y < 0) {
                // 滑翔时重力大幅减小，并且有终极下落速度限制
                playerVelocity.y -= config.glideGravity * dt;
                playerVelocity.y = Math.max(playerVelocity.y, -5.0); // 限制下落速度
                
                // UI 提示
                document.getElementById('glide-hint').style.opacity = 1;
            } else {
                playerVelocity.y -= config.gravity * dt;
                document.getElementById('glide-hint').style.opacity = 0;
            }

            // 移动与碰撞 (Separation)
            controls.moveRight(-playerVelocity.x * dt);
            controls.moveForward(-playerVelocity.z * dt);

            const pPos = camera.position;
            const playerRadius = 0.6;

            for(let obs of obstacles) {
                if (Math.abs(pPos.x - obs.x) > 10 || Math.abs(pPos.z - obs.z) > 10) continue;

                const dx = pPos.x - obs.x;
                const dz = pPos.z - obs.z;
                const distSq = dx*dx + dz*dz;
                const minR = playerRadius + obs.r;

                if(distSq < minR*minR) {
                    const dist = Math.sqrt(distSq);
                    if (dist < 0.001) { pPos.x += 0.1; continue; }
                    const overlap = minR - dist;
                    pPos.x += (dx/dist) * overlap;
                    pPos.z += (dz/dist) * overlap;
                }
            }

            // 地形吸附
            const raycaster = new THREE.Raycaster(pPos, new THREE.Vector3(0, -1, 0), 0, 200);
            const intersects = raycaster.intersectObject(terrainMesh);
            let groundH = -100;
            if(intersects.length > 0) groundH = intersects[0].point.y;

            if (pPos.y < groundH + config.eyeHeight) {
                playerVelocity.y = Math.max(0, playerVelocity.y);
                pPos.y = groundH + config.eyeHeight;
                isGrounded = true; 
                isGliding = false; // 落地自动停止滑翔
            } else {
                isGrounded = false;
            }
            pPos.y += playerVelocity.y * dt;

            if (pPos.y < -50) {
                playerVelocity.set(0,0,0);
                pPos.set(0, 80, 0);
            }
        }

        function checkCurrentBiome(x, z) {
            if (Math.random() > 0.05) return; 

            const moisture = moistureNoise.noise2D(x * 0.003 + 1000, z * 0.003 + 1000);
            const y = camera.position.y - config.eyeHeight;
            const biome = getBiome(y, moisture);
            
            document.getElementById('biome-display').innerText = biome.toUpperCase();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                const dt = Math.min(clock.getDelta(), 0.05);
                const time = clock.getElapsedTime();

                updatePlayer(dt);
                checkCurrentBiome(camera.position.x, camera.position.z);
                
                if(waterMesh) waterMesh.material.uniforms.time.value = time;
                if(cloudGroup) cloudGroup.position.x += dt * 2.0; 

                const px = Math.round(camera.position.x);
                const pz = Math.round(camera.position.z);
                document.getElementById('pos-display').innerText = `${px}, ${pz}`;
                
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const angle = Math.atan2(dir.x, dir.z); 
                const deg = -angle * (180 / Math.PI);
                document.getElementById('minimap-arrow').style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
            }

            renderScene();
        }

        function renderScene() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            renderer.setViewport(0, 0, w, h);
            renderer.setScissor(0, 0, w, h);
            renderer.setScissorTest(true);
            renderer.clear();
            renderer.render(scene, camera);

            const mapDiv = document.getElementById('minimap-container');
            const rect = mapDiv.getBoundingClientRect();
            
            const mapX = rect.left;
            const mapY = h - rect.bottom; 
            const mapW = rect.width;
            const mapH = rect.height;

            renderer.setViewport(mapX, mapY, mapW, mapH);
            renderer.setScissor(mapX, mapY, mapW, mapH);
            renderer.clearDepth(); 

            mapCamera.position.x = camera.position.x;
            mapCamera.position.z = camera.position.z;
            mapCamera.position.y = 200; 
            mapCamera.lookAt(camera.position.x, 0, camera.position.z);

            renderer.render(scene, mapCamera);
            renderer.setScissorTest(false);
        }

        init();

    </script>
</body>
</html>
