<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title></title>
    <link rel="stylesheet" href="/assets/game.css?v=20260329a">
</head>
<body data-api-base="/api">
    <div class="app-shell">
        <main id="game-container" class="game-panel" hidden>
            <header class="battle-topbar">
                <div class="battle-topbar__main">
                    <div class="battle-meta">
                        <span id="mode-chip" class="mode-chip"></span>
                        <button class="mini-button" type="button" data-open-help aria-label="help">?</button>
                    </div>
                    <div class="turn-chip">
                        <span id="turn-label" class="turn-chip__label"></span>
                        <strong id="turn-count" class="turn-chip__value">01</strong>
                    </div>
                </div>

                <div class="meter-strip">
                    <div class="compact-meter" data-tone="urge">
                        <div class="compact-meter__head">
                            <span id="frustration-label"></span>
                            <strong id="frustration-val">50%</strong>
                        </div>
                        <div class="meter-track">
                            <div id="frustration-bar" class="meter-fill meter-fill--urge"></div>
                        </div>
                    </div>

                    <div class="compact-meter" data-tone="anxiety">
                        <div class="compact-meter__head">
                            <span id="anxiety-label"></span>
                            <strong id="anxiety-val">0%</strong>
                        </div>
                        <div class="meter-track">
                            <div id="anxiety-bar" class="meter-fill meter-fill--anxiety"></div>
                        </div>
                    </div>
                </div>

                <p id="panic-warning" class="panic-warning" hidden></p>
            </header>

            <section id="game-content" class="battle-layout">
                <section id="game-scroll" class="partner-stage">
                    <div class="partner-hero">
                        <div class="avatar-shell">
                            <span id="avatar-emoji" class="avatar-emoji">🌚</span>
                            <span id="partner-status" class="partner-status" hidden>⚠️</span>
                        </div>
                        <div class="partner-copy">
                            <p id="scene-label" class="scene-label"></p>
                            <p id="flirt-text" class="partner-opener"></p>
                        </div>
                    </div>

                    <section class="clue-panel">
                        <div class="section-head">
                            <h2 id="clue-title" class="section-title"></h2>
                        </div>
                        <div id="tags-container" class="tags-grid" aria-live="polite"></div>
                    </section>
                </section>

                <aside class="action-dock">
                    <div class="tool-row">
                        <button id="use-testkit-btn" class="tool-button" type="button">
                            <span id="testkit-label" class="tool-button__label"></span>
                            <strong id="item-testkit" class="tool-button__value">x1</strong>
                        </button>

                        <button id="go-hospital-btn" class="tool-button" type="button">
                            <span id="hospital-label" class="tool-button__label"></span>
                            <small id="hospital-note" class="tool-button__note"></small>
                        </button>
                    </div>

                    <button id="btn-chat" class="button button--chat" type="button">
                        <span id="chat-button-label" class="button-label"></span>
                        <span id="chat-button-note" class="button-note"></span>
                    </button>

                    <div id="chat-panel" class="chat-panel" hidden>
                        <p id="chat-panel-hint" class="chat-panel__hint"></p>
                        <div class="chat-panel__grid">
                            <button id="chat-smalltalk-btn" class="chat-option" type="button" data-question-type="smalltalk"></button>
                            <button id="chat-probe-btn" class="chat-option" type="button" data-question-type="probe"></button>
                            <button id="chat-boundary-btn" class="chat-option" type="button" data-question-type="boundary"></button>
                        </div>
                    </div>

                    <div class="action-grid">
                        <button id="btn-oral-condom" class="button action-button action-button--mild" type="button" data-action="oral_condom">
                            <span id="action-oral-condom-title" class="button-label"></span>
                            <small id="action-oral-condom-note" class="button-note"></small>
                        </button>
                        <button id="btn-sex-condom" class="button action-button action-button--safe" type="button" data-action="sex_condom">
                            <span id="action-sex-condom-title" class="button-label"></span>
                            <small id="action-sex-condom-note" class="button-note"></small>
                        </button>
                        <button id="btn-oral-raw" class="button action-button action-button--risk" type="button" data-action="oral_raw">
                            <span id="action-oral-raw-title" class="button-label"></span>
                            <small id="action-oral-raw-note" class="button-note"></small>
                        </button>
                        <button id="btn-sex-raw" class="button action-button action-button--danger" type="button" data-action="sex_raw">
                            <span id="action-sex-raw-title" class="button-label"></span>
                            <small id="action-sex-raw-note" class="button-note"></small>
                        </button>
                    </div>

                    <button id="btn-refuse" class="button button--ghost" type="button" data-action="refuse">
                        <span id="action-refuse-title" class="button-label"></span>
                        <span id="action-refuse-note" class="button-note"></span>
                    </button>
                </aside>
            </section>
        </main>
    </div>

    <section id="intro-modal" class="modal">
        <div class="modal-panel intro-panel">
            <div class="intro-head">
                <p id="intro-kicker" class="modal-kicker"></p>
                <h1 id="intro-title" class="modal-title"></h1>
                <div id="runtime-chip" class="runtime-pill"></div>
                <p id="runtime-note" class="runtime-note"></p>
            </div>

            <div id="intro-lines" class="intro-lines"></div>

            <div class="mode-actions">
                <button id="start-male-btn" class="button button--primary" type="button" data-mode="male" disabled></button>
                <button id="start-female-btn" class="button button--primary button--primary-alt" type="button" data-mode="female" disabled></button>
            </div>

            <div class="modal-actions">
                <button id="open-help-btn" class="button button--secondary" type="button" data-open-help></button>
            </div>
        </div>
    </section>

    <section id="help-modal" class="modal" hidden>
        <div class="modal-panel info-panel">
            <div class="modal-bar">
                <h2 id="help-title" class="modal-section-title"></h2>
                <button class="icon-button" type="button" data-close-help>&times;</button>
            </div>

            <div id="help-sections" class="modal-scroll custom-scroll"></div>

            <div class="modal-actions modal-actions--spread">
                <button id="open-casebook-help-btn" class="button button--secondary" type="button" data-open-casebook></button>
                <button id="close-help-btn" class="button button--secondary" type="button" data-close-help></button>
            </div>
        </div>
    </section>

    <section id="casebook-modal" class="modal" hidden>
        <div class="modal-panel info-panel casebook-panel">
            <div class="modal-bar">
                <h2 id="casebook-title" class="modal-section-title"></h2>
                <button class="icon-button" type="button" data-close-casebook>&times;</button>
            </div>

            <div class="modal-scroll custom-scroll">
                <div id="casebook-summary" class="summary-card"></div>
                <div class="casebook-sections">
                    <section class="casebook-section" data-casebook-section="personas">
                        <h3 class="casebook-section__title"></h3>
                        <div id="casebook-personas" class="casebook-list"></div>
                    </section>
                    <section class="casebook-section" data-casebook-section="lieTypes">
                        <h3 class="casebook-section__title"></h3>
                        <div id="casebook-lieTypes" class="casebook-list"></div>
                    </section>
                    <section class="casebook-section" data-casebook-section="endings">
                        <h3 class="casebook-section__title"></h3>
                        <div id="casebook-endings" class="casebook-list"></div>
                    </section>
                    <section class="casebook-section" data-casebook-section="diseases">
                        <h3 class="casebook-section__title"></h3>
                        <div id="casebook-diseases" class="casebook-list"></div>
                    </section>
                    <section class="casebook-section" data-casebook-section="titles">
                        <h3 class="casebook-section__title"></h3>
                        <div id="casebook-titles" class="casebook-list"></div>
                    </section>
                </div>
            </div>

            <div class="modal-actions">
                <button id="close-casebook-btn" class="button button--secondary" type="button" data-close-casebook></button>
            </div>
        </div>
    </section>

    <section id="feedback-overlay" class="modal" hidden>
        <div class="modal-panel feedback-panel">
            <div class="feedback-head">
                <div id="feedback-icon" class="feedback-icon"></div>
                <div class="feedback-head__copy">
                    <h2 id="feedback-title" class="feedback-title"></h2>
                    <p id="critical-reason" class="critical-copy" hidden></p>
                </div>
            </div>

            <div class="feedback-copy custom-scroll">
                <div id="feedback-message" class="feedback-card"></div>
                <div id="disease-report" class="disease-card" hidden>
                    <p id="disease-content"></p>
                </div>
                <div id="unlock-card" class="unlock-card" hidden></div>

                <details id="history-container" class="history-panel" hidden open>
                    <summary class="history-toggle">
                        <span id="history-title" class="history-title"></span>
                        <span id="history-toggle-meta" class="history-toggle__meta"></span>
                    </summary>
                    <div id="history-list" class="history-list"></div>
                </details>
            </div>

            <div class="feedback-actions">
                <button id="next-btn" class="button button--primary" type="button"></button>
                <button id="restart-btn" class="button button--secondary" type="button" hidden></button>
                <button id="open-casebook-feedback-btn" class="button button--secondary" type="button" data-open-casebook hidden></button>
            </div>
        </div>
    </section>

    <script defer src="/assets/game-data.js?v=20260329a"></script>
    <script defer src="/assets/game.js?v=20260329a"></script>
</body>
</html>
